networks:
  front:
    driver: bridge
    ipam:
      config:
        - subnet: 10.255.255.0/24
          gateway: 10.255.255.254
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"

  back:
    driver: bridge
    ipam:
      config:
        - subnet: 10.254.255.0/24
          gateway: 10.254.255.254
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"

services:
  apache1:
    env_file:
      - .env
    build: site-apache1
    networks:
      front:
        ipv4_address: 10.255.255.22
      back:
        ipv4_address: 10.254.255.22
    expose:
      - "80"
    volumes:
      - ./site-apache1:/var/www/html

  apache2:
    env_file:
      - .env
    build: site-apache2
    networks:
      front:
        ipv4_address: 10.255.255.21
      back:
        ipv4_address: 10.254.255.21
    expose:
      - "80"
    volumes:
      - ./site-apache2:/var/www/html
    depends_on:
      redis:
        condition: service_healthy

  reverse-proxy:
    image: nginx:latest
    depends_on:
      - apache1
      - apache2
    networks:
      front:
        ipv4_address: 10.255.255.20
    ports:
      - "80:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro

  bd:
    image: postgres:16
    command:
      - postgres
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    networks:
      back:
        ipv4_address: 10.254.255.31
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/pg_hba.conf:/etc/postgresql/pg_hba.conf

  redis:
    image: redis:latest
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      back:
        ipv4_address: 10.254.255.30
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  trivy:
    image: aquasec/trivy:0.61.0
    entrypoint: "/bin/sh"
    command: "-c '(trivy image projet1-apache1 ; trivy image projet1-apache2 ; trivy image postgres:16 ; trivy image redis:latest ; trivy image nginx:latest) > /logs/trivy-$(date +%Y.%m.%d-%H-%M-%S).log 2>&1'"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/logs
      - ./trivy-cache:/root/.cache/trivy
    networks:
      - front

volumes:
  pg_data:
  redis_data: