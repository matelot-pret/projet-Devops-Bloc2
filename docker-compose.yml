networks:
  front:
    driver: bridge
    ipam:
      config:
        - subnet: 10.255.255.0/24
          gateway: 10.255.255.254
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"

  back:
    driver: bridge
    ipam:
      config:
        - subnet: 10.254.255.0/24
          gateway: 10.254.255.254
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"

services:

  # ── Serveur web SANS cache (apache1) ─────────────────────────────────────
  apache1:
    build:
      context: ./site-apache1
      dockerfile: Dockerfile
    networks:
      front:
        ipv4_address: 10.255.255.22
      back:
        ipv4_address: 10.254.255.22
    expose:
      - "80"
    volumes:
      # Bind mount : le code source est servi en live depuis ce dossier.
      # .htaccess à la racine redirige vers public/ via mod_rewrite.
      - ./site-apache1:/var/www/html
    env_file:
      - .env

  # ── Serveur web AVEC cache Redis (apache2) ────────────────────────────────
  apache2:
    build:
      context: ./site-apache2
      dockerfile: Dockerfile
    networks:
      front:
        ipv4_address: 10.255.255.21
      back:
        ipv4_address: 10.254.255.21
    expose:
      - "80"
    volumes:
      - ./site-apache2:/var/www/html
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  # ── Reverse proxy / load balancer ────────────────────────────────────────
  reverse-proxy:
    image: nginx:latest
    depends_on:
      - apache1
      - apache2
    networks:
      front:
        ipv4_address: 10.255.255.20
    ports:
      - "80:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro

  # ── Base de données PostgreSQL ────────────────────────────────────────────
  bd:
    image: postgres:16
    command: ["postgres", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    networks:
      back:
        ipv4_address: 10.254.255.31
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/pg_hba.conf:/etc/postgresql/pg_hba.conf

  # ── Cache Redis ───────────────────────────────────────────────────────────
  redis:
    image: redis:latest
    # Format liste YAML obligatoire pour passer des arguments à redis-server
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      back:
        ipv4_address: 10.254.255.30
    env_file:
      - .env
    healthcheck:
      # Le healthcheck s'authentifie aussi — sinon il retourne NOAUTH
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Scanner de vulnérabilités Trivy (one-shot) ────────────────────────────
  trivy:
    image: aquasec/trivy:0.61.0
    entrypoint: "/bin/sh"
    command: >
      -c 'trivy image
        --format table
        --output /logs/trivy-$(date +%Y.%m.%d-%H-%M-%S).log
        projet1-apache1
        projet1-apache2
        postgres:16
        redis:latest
        nginx:latest'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # bind mount : le cache (~90MB) survit aux docker compose down -v
      - ./trivy-cache:/root/.cache/trivy
      - ./logs:/logs
    networks:
      - front

volumes:
  pg_data:
